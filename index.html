<!DOCTYPE html>
<html>
<head>
  <title>AtlantisMC</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0b1220, #05080f);
      color: white;
      text-align: center;
    }

    .container {
      padding: 30px;
    }

    img {
      width: 150px;
      border-radius: 20px;
      box-shadow: 0 0 20px #00aaff;
    }

    h1 {
      font-size: 35px;
      margin: 10px 0;
    }

    .box {
      background: #111a2e;
      padding: 15px;
      border-radius: 15px;
      margin: 20px auto;
      width: 300px;
      box-shadow: 0 0 15px #00aaff33;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 250px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .blue { background: #0099ff; }
    .purple { background: #6a5cff; }
    .green { background: #00c37a; }

  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="https://i.imgur.com/yourlogo.png">

  <h1>AtlantisMC Network</h1>
  <p>The Ultimate Lifesteal SMP Realm</p>

  <div class="box">
    <p>Server Address: <b>play.yourserver.fun</b></p>
    <p>Active Players: 1 / 69</p>
  </div>

  <a href="#" class="btn blue">🛒 Browse Store</a>
  <a href="#" class="btn purple">💬 Discord</a>
  <a href="#" class="btn green">👍 Vote</a>

</div>

</body>
</html>
