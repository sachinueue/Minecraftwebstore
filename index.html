<!DOCTYPE html>
<html>
<head>
  <title>GenZ SMP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f2a;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .logo {
      width: 140px;
      margin-top: 20px;
    }

    .card {
      background: #1b1f4a;
      border-radius: 20px;
      padding: 15px;
      margin: 15px;
    }

    .menu-btn {
      background: #2a2f6b;
      padding: 15px;
      border-radius: 15px;
      margin: 10px 0;
      cursor: pointer;
    }

    .active {
      background: linear-gradient(45deg,#7b2cff,#b84dff);
    }

    .section {
      display: none;
    }

    .show {
      display: block;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 90%;
      max-width: 300px;
      border-radius: 12px;
      border: none;
      color: white;
      font-weight: bold;
    }

    .purple {
      background: linear-gradient(45deg,#7b2cff,#b84dff);
    }

  </style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://i.imgur.com/8Km9tLL.png">

  <h1>🔥 GenZ SMP</h1>
  <p>genzsmp.mnode.net</p>

  <!-- MENU -->
  <div class="card">
    <div class="menu-btn active" onclick="showTab('home', this)">🏠 Home</div>
    <div class="menu-btn" onclick="showTab('ranks', this)">🏆 Ranks</div>
    <div class="menu-btn" onclick="showTab('keys', this)">🗝️ Keys</div>
  </div>

  <!-- HOME -->
  <div id="home" class="section show card">
    <h2 style="color:#ff4dff;">About GenZ SMP</h2>
    <p>Fun + PvP Minecraft server with balanced system.</p>
  </div>

  <!-- RANKS -->
  <div id="ranks" class="section card">
    <h2 style="color:#ff4dff;">Server Ranks</h2>

    <h3>+RANK</h3>
    <p>₹49 / month</p>

    <button onclick="openPopup()" class="btn purple">🛒 Purchase</button>
  </div>

  <!-- KEYS -->
  <div id="keys" class="section card">
    <h2 style="color:#ff4dff;">Crate Keys</h2>

    <h3>Amethyst Key</h3>
    <p>₹199</p>

    <button onclick="openPopup()" class="btn purple">🛒 Purchase</button>
  </div>

</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;">
  <div style="background:#1b1f4a;padding:20px;border-radius:15px;width:90%;max-width:300px;margin:100px auto;">

    <span onclick="closePopup()" style="float:right;font-size:25px;">×</span>

    <h2>Checkout</h2>

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourupiid">

    <p style="font-size:14px;">
      Scan karo → pay karo → screenshot → Discord
    </p>

  </div>
</div>

<script>
function showTab(tabId, el) {
  document.querySelectorAll('.section').forEach(e => e.classList.remove('show'));
  document.getElementById(tabId).classList.add('show');

  document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function openPopup() {
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
