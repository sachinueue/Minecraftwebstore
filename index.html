<!DOCTYPE html>
<html>
<head>
  <title>GenZ SMP</title>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0b1220, #05080f);
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .logo {
      width: 140px;
      border-radius: 20px;
      box-shadow: 0 0 25px #00aaff;
      margin-top: 20px;
    }

    h1 {
      font-size: 28px;
      margin: 10px 0;
    }

    p {
      opacity: 0.8;
    }

    .box {
      background: #111a2e;
      padding: 15px;
      border-radius: 15px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 15px #00aaff33;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 14px;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .blue { background: #00aaff; }
    .purple { background: #6a5cff; }
    .green { background: #00c37a; }

  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img class="logo" src="https://i.imgur.com/8Km9tLL.png">

  <h1>🔥 GenZ SMP</h1>
  <p>The Ultimate Lifesteal Server</p>

  <div class="box">
    <p>Server IP: <b>genzsmp.mnode.net</b></p>
    <p>Active Players: Coming Soon</p>
  </div>

  <!-- BUTTONS -->
  <a href="#" class="btn blue">🛒 Store</a>
  <a href="#" class="btn purple">💬 Discord</a>
  <a href="#" class="btn green">👍 Vote</a>

</div>

</body>
</html>
