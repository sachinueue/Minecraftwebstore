<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENZSMP Store</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0c0c0c;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 80px;
}

.server-name {
  margin-top: 10px;
  background: #1a1a1a;
  display: inline-block;
  padding: 8px 20px;
  border-radius: 10px;
  font-weight: bold;
}

/* FEATURE CARD */
.feature {
  margin: 20px;
  background: linear-gradient(135deg, #1e90ff, #007bff);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.feature-text {
  text-align: left;
}

.feature h2 {
  margin: 0;
}

.feature ul {
  padding-left: 20px;
  font-size: 14px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: #161616;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 50px;
}

.price {
  color: #aaa;
  margin: 5px 0;
}

/* BUTTON */
.btn {
  background: #1e90ff;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.qty {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 10px;
}

.qty button {
  background: #222;
  border: none;
  padding: 5px 10px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.qty button.active {
  background: #1e90ff;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/590/590685.png" class="logo">
  <div class="server-name">GENZSMP.NET</div>
</div>

<!-- FEATURE -->
<div class="feature">
  <div class="feature-text">
    <h2>Donut+ Rank</h2>
    <p>(30 Day Subscription)</p>
    <ul>
      <li>+3 Homes</li>
      <li>/fly in lobbies</li>
      <li>Priority Queue</li>
      <li>Faster Auction</li>
    </ul>
  </div>
</div>

<!-- KEYS -->
<div class="grid">

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/861/861060.png">
  <h3>Common</h3>
  <div class="price">₹49</div>
  <div class="qty">
    <button class="active">1x</button>
    <button>5x</button>
    <button>10x</button>
  </div>
  <button class="btn">Add to Cart</button>
</div>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/861/861060.png">
  <h3>Prime</h3>
  <div class="price">₹99</div>
  <div class="qty">
    <button class="active">1x</button>
    <button>5x</button>
    <button>10x</button>
  </div>
  <button class="btn">Add to Cart</button>
</div>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/861/861060.png">
  <h3>Gold</h3>
  <div class="price">₹149</div>
  <div class="qty">
    <button class="active">1x</button>
    <button>5x</button>
    <button>10x</button>
  </div>
  <button class="btn">Add to Cart</button>
</div>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/861/861060.png">
  <h3>Amethyst</h3>
  <div class="price">₹199</div>
  <div class="qty">
    <button class="active">1x</button>
    <button>5x</button>
    <button>10x</button>
  </div>
  <button class="btn">Add to Cart</button>
</div>

<div class="card">
  <img src="https://cdn-icons-png.flaticon.com/512/861/861060.png">
  <h3>Crimson</h3>
  <div class="price">₹249</div>
  <div class="qty">
    <button class="active">1x</button>
    <button>5x</button>
    <button>10x</button>
  </div>
  <button class="btn">Add to Cart</button>
</div>

</div>

</body>
</html>
