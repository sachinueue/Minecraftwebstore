<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENZ SMP Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f2a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

/* TOP INFO */
.top-info {
  margin-bottom: 15px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 10px;
  color: #ccc;
}

/* CLICKABLE DISCORD */
.discord-link {
  cursor: pointer;
  font-weight: bold;
  color: white;
}

/* LOGO ANIMATION */
@keyframes logoFloat {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.main-logo {
  width: 200px;
  margin: 15px auto;
  display: block;
  animation: logoFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(255, 79, 216, 0.5));
}

/* MENU */
.menu {
  background: #1c1f4a;
  border-radius: 25px;
  padding: 15px;
}

/* FIX: LEFT LINE REMOVED */
.menu-btn {
  background: #3a3f7a;
  padding: 18px;
  margin: 12px 0;
  border-radius: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 18px;
  color: #bfbfd9;
  transition: 0.3s;
}

/* REMOVE LINE COMPLETELY */
.menu-btn::before {
  display: none;
}

/* ACTIVE */
.menu-btn.active {
  background: linear-gradient(45deg, #7b2cff, #ff4fd8);
  color: white;
}

.menu-btn:hover {
  transform: scale(1.02);
}

/* SECTIONS */
.section {
  display: none;
  margin-top: 20px;
}

.section.active {
  display: block;
}

/* CARD */
.card {
  background: #1c1f4a;
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  text-align: left;
}
</style>

<script>
function showTab(tab) {
  document.querySelectorAll(".section").forEach(e => e.classList.remove("active"));
  document.querySelectorAll(".menu-btn").forEach(e => e.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  document.getElementById("btn-" + tab).classList.add("active");
}

/* DISCORD CLICK */
function openDiscord() {
  window.open("https://discord.gg/4p4Ab7kZt", "_blank");
}
</script>

</head>

<body>

<div class="container">

<!-- TOP INFO -->
<div class="top-info">
  <div class="info-item">
    🌟 genzsmp.mnode.net
  </div>

  <div class="info-item discord-link" onclick="openDiscord()">
      💬 Join our Community 
  </div>
</div>

<!-- LOGO -->
<img class="main-logo" src="file_00000000eba8720b849f8f6929892918.png">

<h1>🔥 GENZ SMP</h1>

<!-- MENU -->
<div class="menu">
  <div id="btn-home" class="menu-btn active" onclick="showTab('home')">🏠 Home</div>
  <div id="btn-ranks" class="menu-btn" onclick="showTab('ranks')">🏆 Ranks</div>
  <div id="btn-keys" class="menu-btn" onclick="showTab('keys')">🗝️ Keys</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2 style="color:#ff4fd8;">About GenZ SMP</h2>
    <p>
      GenZ SMP is a competitive and fun Minecraft survival server built for players who love progression, PvP, grinding, and community.
    </p>
  </div>
</div>

<!-- RANKS -->
<div id="ranks" class="section">
  <div class="card">
    <h2 style="color:#ff4fd8;">Server Ranks</h2>
    <p>Ranks coming soon...</p>
  </div>
</div>

<!-- KEYS -->
<div id="keys" class="section">
  <div class="card">
    <h2 style="color:#ff4fd8;">Crate Keys</h2>
    <p>Keys coming soon...</p>
  </div>
</div>

</div>

</body>
</html>
